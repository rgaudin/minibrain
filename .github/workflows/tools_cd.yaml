name: tools

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'pyproject.toml'
      - 'README.md'
  workflow_dispatch:

jobs:

  rsyncd:
    name: Deploy minibrain-tools Image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Publish Docker Image
        uses: openzim/docker-publish-action@v10
        with:
          image-name: kiwix/minibrain-tools
          on-master: latest
          restrict-to: kiwix/minibrain
          registries: ghcr.io
          credentials:
            GHCRIO_USERNAME=${{ secrets.GHCR_USERNAME }}
            GHCRIO_TOKEN=${{ secrets.GHCR_TOKEN }}
